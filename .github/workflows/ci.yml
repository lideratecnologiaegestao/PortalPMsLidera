name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: portal_test
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U portal" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://portal:portal@localhost:5432/portal_test
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: api/package-lock.json }
      - run: npm ci
      - name: Aplicar migrations (RLS)
        run: for f in ../db/*.sql; do psql "$DATABASE_URL" -f "$f"; done
      - run: npm run prisma:generate
      - name: Lint
        run: npm run lint --if-present
      - name: Testes (unit + integração + ISOLAMENTO RLS)
        run: npm test --if-present
      - name: Build
        run: npm run build

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build
      - name: Acessibilidade (axe) + e2e
        run: npm run test:e2e --if-present

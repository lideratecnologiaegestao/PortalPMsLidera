apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-api
  namespace: portal
  labels: { app: portal-api }
  annotations:
    # Em manifesto k8s o skip do Checkov é via annotation (não comentário).
    checkov.io/skip1: CKV_K8S_43=digest resolvido pelo CD no build (a tag fixa vira @sha256 no pipeline)
    checkov.io/skip2: CKV_K8S_35=segredos via secretRef (Kubernetes Secret); sem valor em texto claro no manifesto
spec:
  replicas: 3
  selector: { matchLabels: { app: portal-api } }
  template:
    metadata: { labels: { app: portal-api } }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: api
          image: ghcr.io/org/portal-api:1.0.0
          imagePullPolicy: Always
          ports: [{ containerPort: 3001 }]
          envFrom:
            - secretRef: { name: portal-api-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 3001 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: '1', memory: 512Mi }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: portal-api
  namespace: portal
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: portal-api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }

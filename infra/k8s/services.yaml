# Services internos (ClusterIP). O Ingress publica web/api por Host.
apiVersion: v1
kind: Service
metadata:
  name: portal-api
  namespace: portal
spec:
  selector: { app: portal-api }
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: portal-web
  namespace: portal
spec:
  selector: { app: portal-web }
  ports:
    - name: http
      port: 3000
      targetPort: 3000

# Deployment do portal web (Next.js SSR/ISR). Mesmo build serve todos os
# tenants; o tema/conteúdo é resolvido por Host em runtime.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-web
  namespace: portal
  labels: { app: portal-web }
  annotations:
    checkov.io/skip1: CKV_K8S_43=digest resolvido pelo CD no build (a tag fixa vira @sha256 no pipeline)
spec:
  replicas: 2
  selector:
    matchLabels: { app: portal-web }
  template:
    metadata:
      labels: { app: portal-web }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
      containers:
        - name: web
          image: portal-web:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: 'http://portal-api:3001'
            - name: NODE_ENV
              value: 'production'
          resources:
            requests: { cpu: '100m', memory: '256Mi' }
            limits: { cpu: '500m', memory: '512Mi' }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: portal-web
  namespace: portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: portal-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
